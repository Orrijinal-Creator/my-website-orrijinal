<!DOCTYPE html>
<html>

<head>

<title>Pinterest Pins</title>

<link rel="stylesheet" href="style.css">

<style>

/* BOARD CARD */

.board-card{
cursor:pointer;
text-align:center;
transition:0.3s;
}

.board-card:hover{
transform:translateY(-6px);
}


/* MODAL BACKGROUND */

.pin-modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:999;
justify-content:center;
align-items:center;
padding:20px;
}


/* MODAL CONTAINER */

.modal-container{
background:white;
max-width:1000px;
width:100%;
border-radius:12px;
padding:30px;
overflow-y:auto;
max-height:90vh;
animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:scale(0.9);
}
to{
opacity:1;
transform:scale(1);
}
}


/* MODAL HEADER */

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.close-btn{
background:#e60023;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}


/* PIN GRID */

.pin-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.pin-item img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.pin-item img:hover{
transform:scale(1.05);
}


/* IMAGE VIEWER */

.image-viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:2000;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
padding:20px;
}

.image-viewer img{
max-width:90%;
max-height:80%;
border-radius:10px;
animation:zoomIn 0.3s ease;
}

.image-title{
color:white;
margin-top:15px;
font-size:18px;
text-align:center;
}

@keyframes zoomIn{
from{
transform:scale(0.7);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

</style>

</head>

<body>

<header class="navbar">

<div class="logo">Harold Jirro</div>

<nav>
<a href="index.html">Home</a>
<a href="pins.html">Pins</a>
<a href="blog.html">Ideas</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<section class="section">

<h1>My Creative Pins</h1>

<p>Browse some of my creative Pinterest boards.</p>

</section>


<section class="grid">

<div class="card board-card" onclick="openBoard('avatarBoard')">
<h3>Avatar Icons Designs</h3>
<p>Creative Avatar Ideas and Profile Icons.</p>
</div>

<div class="card board-card" onclick="openBoard('angryBoard')">
<h3>Angry Nailong</h3>
<p>Expressive Angry Nailong Avatars Icons.</p>
</div>

<div class="card board-card" onclick="openBoard('savageBoard')">
<h3>Savage Nailong</h3>
<p>Expressive Savage Nailong Avatars Icons.</p>
</div>

</section>



<!-- BOARD MODAL -->

<div class="pin-modal" id="pinModal">

<div class="modal-container">

<div class="modal-header">

<h2 id="boardTitle"></h2>

<button class="close-btn" onclick="closeBoard()">Close</button>

</div>

<div class="pin-grid" id="pinGallery"></div>

</div>

</div>



<!-- IMAGE VIEWER -->

<div class="image-viewer" id="imageViewer" onclick="closeImage()">

<img id="viewerImage">

<div class="image-title" id="imageTitle"></div>

</div>



<script>

/* BOARD DATA */

const boards = {

avatarBoard:{
title:"Avatar Icons Designs",
images:[
'<img src="avatar1.jpg">',
'<img src="avatar2.jpg">',
'<img src="avatar3.jpg">',
'<img src="avatar4.jpg">',
'<img src="avatar5.jpg">',
'<img src="avatar6.jpg">',
'<img src="avatar7.jpg">',
'<img src="avatar8.jpg">',
'<img src="avatar9.jpg">',
'<img src="avatar10.jpg">',
'<img src="avatar11.jpg">',
'<img src="avatar12.jpg">',
'<img src="avatar13.jpg">',
'<img src="avatar14.jpg">',
'<img src="avatar15.jpg">',
'<img src="avatar16.jpg">',
'<img src="avatar17.jpg">',
'<img src="avatar18.jpg">'
]
},

angryBoard:{
title:"Angry Nailong",
images:[
'<img src="White Angry Nailong.jpg">',
'<img src="Black Angry Nailong.jpg">',
'<img src="Army Green Angry Nailong.jpg">',
'<img src="Silver Angry Nailong.jpg">',
'<img src="Beige Angry Nailong.jpg">',
'<img src="Lilac Angry Nailong.jpg">',
'<img src="Maroon Angry Nailong.jpg">',
'<img src="Cyan Angry Nailong.jpg">',
'<img src="Purple Angry Nailong.jpg">',
'<img src="Pink Angry Nailong.jpg">',
'<img src="Brown Angry Nailong.jpg">',
'<img src="Orange Angry Nailong.jpg">',
'<img src="Gray Angry Nailong.jpg">',
'<img src="Green Angry Nailong.jpg">',
'<img src="Red Angry Nailong.jpg">',
'<img src="Blue Angry Nailong.jpg">'
]
},

savageBoard:{
title:"Savage Nailong",
images:[
'<img src="Blue Nailong HD Icon - Savage.jpg">',
'<img src="White Nailong HD Icon - Savage.jpg">',
'<img src="Matte Black Nailong HD Icon-Savage.jpg">'
]
}

};



/* OPEN BOARD */

function openBoard(boardName){

const modal=document.getElementById("pinModal");
const gallery=document.getElementById("pinGallery");
const title=document.getElementById("boardTitle");

gallery.innerHTML="";
title.innerText=boards[boardName].title;

boards[boardName].images.forEach(img=>{

const pin=document.createElement("div");
pin.classList.add("pin-item");

pin.innerHTML=img;

gallery.appendChild(pin);

});

modal.style.display="flex";

/* ADD CLICK TO IMAGES */

setTimeout(()=>{

document.querySelectorAll(".pin-item img").forEach(image=>{

image.onclick=function(e){

e.stopPropagation();

openImage(this.src);

}

});

},100);

}



/* CLOSE BOARD */

function closeBoard(){
document.getElementById("pinModal").style.display="none";
}



/* IMAGE VIEWER */

function openImage(src){

document.getElementById("viewerImage").src=src;

/* EXTRACT IMAGE NAME */

let name=src.split("/").pop();
name=name.replace(/\.[^/.]+$/,"");

document.getElementById("imageTitle").innerText=name;

document.getElementById("imageViewer").style.display="flex";

}

function closeImage(){

document.getElementById("imageViewer").style.display="none";

}



/* CLOSE MODAL OUTSIDE */

window.onclick=function(event){

const modal=document.getElementById("pinModal");

if(event.target===modal){
modal.style.display="none";
}

}

</script>

</body>
</html>
