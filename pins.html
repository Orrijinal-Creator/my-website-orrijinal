<!DOCTYPE html>
<html>

<head>

<title>Pinterest Pins</title>

<link rel="stylesheet" href="style.css">

<style>

/* BOARD CARDS */

.board-card{
cursor:pointer;
text-align:center;
}

.board-card:hover{
transform:translateY(-6px);
}


/* MODAL */

.pin-modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:999;
justify-content:center;
align-items:center;
padding:20px;
}

.modal-container{
background:white;
max-width:1000px;
width:100%;
border-radius:12px;
padding:30px;
overflow-y:auto;
max-height:90vh;
animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.9);}
to{opacity:1; transform:scale(1);}
}


/* MODAL HEADER */

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.close-btn{
background:#e60023;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}


/* PIN GRID */

.pin-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.pin-item img{
width:100%;
border-radius:10px;
transition:0.3s;
}

.pin-item img:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<header class="navbar">

<div class="logo">Harold Jirro</div>

<nav>
<a href="index.html">Home</a>
<a href="pins.html">Pins</a>
<a href="blog.html">Ideas</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<section class="section">

<h1>My Creative Pins</h1>

<p>Browse some of my favorite creative boards.</p>

</section>


<section class="grid">

<div class="card board-card" onclick="openBoard('avatarBoard')">
<h3>Avatar Designs</h3>
<p>Creative avatar ideas and profile icons.</p>
</div>

<div class="card board-card" onclick="openBoard('emojiBoard')">
<h3>Emoji Characters</h3>
<p>Expressive cartoon and emoji avatars.</p>
</div>

<div class="card board-card" onclick="openBoard('quotesBoard')">
<h3>Quote Designs</h3>
<p>Inspirational Pinterest quote graphics.</p>
</div>

</section>



<!-- MODAL -->

<div class="pin-modal" id="pinModal">

<div class="modal-container">

<div class="modal-header">

<h2 id="boardTitle"></h2>

<button class="close-btn" onclick="closeBoard()">Close</button>

</div>

<div class="pin-grid" id="pinGallery">

</div>

</div>

</div>



<script>

/* SAMPLE PIN DATA */

const boards = {

avatarBoard: {
title: "Avatar Designs",
images: [
"https://picsum.photos/400?random=1",
"https://picsum.photos/400?random=2",
"https://picsum.photos/400?random=3",
"https://picsum.photos/400?random=4",
"https://picsum.photos/400?random=5"
]
},

emojiBoard: {
title: "Emoji Characters",
images: [
"https://picsum.photos/400?random=6",
"https://picsum.photos/400?random=7",
"https://picsum.photos/400?random=8",
"https://picsum.photos/400?random=9"
]
},

quotesBoard: {
title: "Quote Designs",
images: [
"https://picsum.photos/400?random=10",
"https://picsum.photos/400?random=11",
"https://picsum.photos/400?random=12"
]
}

};


/* OPEN BOARD */

function openBoard(boardName){

const modal = document.getElementById("pinModal");
const gallery = document.getElementById("pinGallery");
const title = document.getElementById("boardTitle");

gallery.innerHTML="";

title.innerText = boards[boardName].title;

boards[boardName].images.forEach(img => {

const pin = document.createElement("div");
pin.classList.add("pin-item");

pin.innerHTML = `<img src="${img}" alt="Pin Image">`;

gallery.appendChild(pin);

});

modal.style.display="flex";

}


/* CLOSE BOARD */

function closeBoard(){
document.getElementById("pinModal").style.display="none";
}


/* CLOSE WHEN CLICK OUTSIDE */

window.onclick = function(event){

const modal = document.getElementById("pinModal");

if(event.target === modal){
modal.style.display="none";
}

}

</script>


</body>
</html>
